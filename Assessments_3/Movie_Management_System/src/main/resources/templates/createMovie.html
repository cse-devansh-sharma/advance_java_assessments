<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Movie</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

    <h1>Add New Movie</h1>

    <form th:action="@{/movie/create}" th:object="${movie}" method="post">

        <label>Title</label>
        <input type="text" th:field="*{title}" placeholder="Enter title"/>

        <label>Director</label>
        <input type="text" th:field="*{director}" placeholder="Enter director"/>

        <label>Genre</label>
        <input type="text" th:field="*{genre}" placeholder="Enter genre"/>

        <label>Rating</label>
        <input type="text" th:field="*{rating}" placeholder="Enter rating"/>

        <label>Release Year</label>
        <input type="text" th:field="*{releaseYear}" placeholder="Enter release year"/>

        <button type="submit">Save Movie</button>
        <a href="/movie/list">Cancel</a>

    </form>

</body>
</html>
